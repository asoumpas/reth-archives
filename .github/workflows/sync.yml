name: Daily Sync (ημερήσια αυτόματη ενημέρωση)

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: diavgeia-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Incremental sync
        run: python diavgeia_sync.py

      - name: Build data.json
        run: python build_json.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f diavgeia.db docs/data.json
          if git diff --staged --quiet; then
            echo "Καμία νεα πραξη σημερα."
          else
            git commit -m "sync: ημερησια ενημερωση [skip ci]"
            git push
          fi
